# Full local stack: API + Redis (state/rate-limit) + Postgres (durable history).
#   docker compose up --build   then open http://localhost:3000

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/jobs
      WORKER_CONCURRENCY: "5"
      RATE_LIMIT_MAX: "30"
      # API_KEYS: "demo-key:acme-co"   # uncomment to require x-api-key
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
