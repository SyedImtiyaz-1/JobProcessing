# nginx reverse proxy: public :80 -> app :3000.
# SSE-aware (buffering OFF on event streams, long read timeout) so the live
# dashboard stream isn't buffered or cut off.
#
# Install (Amazon Linux / RHEL):
#   sudo cp deploy/nginx-jobapi.conf /etc/nginx/conf.d/jobapi.conf
#   sudo nginx -t && sudo systemctl enable --now nginx && sudo systemctl reload nginx
# (Ubuntu: put it in /etc/nginx/sites-available/ and symlink to sites-enabled/)

server {
    listen 80 default_server;
    server_name _;

    # SSE streams: must not buffer, must stay open.
    location ~ ^/api/(events|jobs/[^/]+/events)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # Everything else (API + dashboard static assets).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
